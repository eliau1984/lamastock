<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LamaStock Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { margin:0; font-family:-apple-system, system-ui, sans-serif; background:#f2f2f7; user-select: none; overflow-x: hidden; }
        .header { text-align: center; padding: 30px 15px; background: linear-gradient(135deg, #6a5cff, #4a3fff); color: white; }
        .logo-big { width: 320px; max-width: 80%; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .top-bar { display:flex; justify-content:space-between; padding:10px 15px; background: #fff; }
        .top-bar button { background: #f2f2f7; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 600; }
        #logoutBtn { display: none; background: #ff3b30; color: white; }
        
        .container { max-width:500px; margin:auto; padding:20px; }
        
        /* עיצוב שדות הבחירה כמו בתמונה */
        select { 
            width:100%; padding:18px; margin-bottom:15px; border-radius:15px; 
            border: 1px solid #ddd; background:white; font-size: 18px; font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center;
        }

        /* עיצוב הכפתורים כמו בתמונה */
        .buttons { display:flex; gap:12px; margin-bottom: 30px; }
        .buttons button { 
            flex:1; height: 100px; border-radius:20px; border:none; 
            font-weight:800; color: white; font-size: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .buttons button:active { transform: scale(0.95); }
        .buttons button:disabled { opacity: 0.5; filter: grayscale(1); }
        
        .ok-btn { background:#34c759; }
        .low-btn { background:#ffcc00; color: #000 !important; }
        .missing-btn { background:#ff3b30; }
        
        .btn-icon-img { width: 40px; height: 40px; }

        /* רשימת הדיווחים */
        .card-wrapper { position: relative; margin-bottom: 12px; border-radius: 20px; background: #ff3b30; overflow: hidden; }
        .card { 
            background:white; position:relative; z-index:2; border-radius:20px; padding:20px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.3s ease; touch-action: pan-y;
        }
        .card.missing { border-right:8px solid #ff3b30; }
        .card.low { border-right:8px solid #ffcc00; }
        .delete-action { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 100px; 
            background: #ff3b30; color: white; display: flex; align-items: center; 
            justify-content: center; font-weight: 700; z-index: 1;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="https://imgur.com/F8tpXBE.png" class="logo-big">
</div>

<div class="top-bar">
    <button id="loginBtn" onclick="loginManager()">👤 איש משק</button>
    <button id="logoutBtn" onclick="logoutManager()">יציאה 👋</button>
</div>

<div class="container">
    <select id="kitchen" onchange="loadReports()"></select>
    <select id="product"></select>

    <div class="buttons" id="actionButtons">
        <button class="ok-btn" onclick="report('OK')">
            <img src="https://i.imgur.com/Tid7O0I.png" class="btn-icon-img"> יש
        </button>
        <button class="low-btn" onclick="report('LOW')">
            <img src="https://i.imgur.com/7H66z5u.png" class="btn-icon-img"> מעט
        </button>
        <button class="missing-btn" onclick="report('MISSING')">
            <img src="https://i.imgur.com/o6v7aO1.png" class="btn-icon-img"> חסר
        </button>
    </div>

    <div id="reportsList"></div>
</div>

<script>
    const SUPABASE_URL = "https://wjkqdlafwuucmpluvueu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indqa3FkbGFmd3V1Y21wbHV2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODA0MTcsImV4cCI6MjA5MTY1NjQxN30.ZjnmAtxYl94J-scm0WDiz8J4H0Plh06mn8MV2q5Bkpc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isManager = false;

    function updateUI() {
        document.getElementById('loginBtn').style.display = isManager ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = isManager ? 'block' : 'none';
        const btns = document.querySelectorAll('#actionButtons button, select');
        btns.forEach(b => b.disabled = isManager);
    }

    async function loginManager() {
        const pass = prompt("סיסמת מנהל:");
        if (pass === "1234") { isManager = true; updateUI(); loadReports(); }
    }

    function logoutManager() { isManager = false; updateUI(); loadReports(); }

    async function report(type) {
        const kId = document.getElementById('kitchen').value;
        const pId = document.getElementById('product').value;
        if(!kId || !pId) return;

        const { error } = await supabaseClient.from('reports').upsert(
            { kitchen_id: parseInt(kId), product_id: parseInt(pId), type: type },
            { onConflict: 'kitchen_id,product_id' }
        );

        if (!error) {
            if (type === 'OK') confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            loadReports();
        } else {
            console.error(error);
        }
    }

    async function deleteReport(id) {
        await supabaseClient.from('reports').delete().eq('id', id);
        loadReports();
    }

    async function loadReports() {
        const { data, error } = await supabaseClient.from('reports')
            .select(`id, type, kitchens(name), products(name)`)
            .neq('type', 'OK')
            .order('id', { ascending: false });

        const list = document.getElementById('reportsList');
        list.innerHTML = "";

        if (data) {
            data.forEach(r => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                
                const del = document.createElement('div');
                del.className = 'delete-action';
                del.innerText = 'מחיקה';
                del.onclick = () => deleteReport(r.id);

                const card = document.createElement('div');
                card.className = `card ${r.type.toLowerCase()}`;
                card.innerHTML = `<div><b>${r.kitchens.name}</b><br><small>${r.products.name}</small></div>
                                  <div>${r.type === 'MISSING' ? '❌' : '⚠️'}</div>`;
                
                // הוספת סלייד למחיקה
                let startX = 0, currentX = 0;
                card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
                card.addEventListener('touchmove', e => {
                    currentX = e.touches[0].clientX - startX;
                    if (currentX < 0 && currentX > -100) card.style.transform = `translateX(${currentX}px)`;
                });
                card.addEventListener('touchend', () => {
                    if (currentX < -70) {
                        if (confirm("למחוק?")) { card.style.transform = 'translateX(-100%)'; setTimeout(()=>deleteReport(r.id), 200); }
                        else card.style.transform = 'translateX(0)';
                    } else card.style.transform = 'translateX(0)';
                    currentX = 0;
                });

                wrapper.appendChild(del);
                wrapper.appendChild(card);
                list.appendChild(wrapper);
            });
        }
    }

    async function init() {
        const { data: ks } = await supabaseClient.from('kitchens').select('*');
        const { data: ps } = await supabaseClient.from('products').select('*');
        const kSel = document.getElementById('kitchen');
        const pSel = document.getElementById('product');
        ks?.forEach(k => kSel.add(new Option(k.name, k.id)));
        ps?.forEach(p => pSel.add(new Option(p.name, p.id)));
        loadReports();
    }

    init();
</script>
</body>
</html>
