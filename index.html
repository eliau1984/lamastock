<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LamaStock Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin:0; font-family:-apple-system, system-ui, sans-serif; background:#f2f2f7; user-select: none; overflow-x: hidden; }
        .header { text-align: center; padding: 25px; background: linear-gradient(135deg, #6a5cff, #4a3fff); border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
        .logo-big { width: 350px; max-width: 85%; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .top-bar { display:flex; justify-content:space-between; padding:15px; }
        .top-bar button { background: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        #logoutBtn { display: none; background: #ff3b30; color: white; }
        .container { max-width:500px; margin:auto; padding:15px; }
        select { width:100%; padding:18px; margin-bottom:12px; border-radius:16px; border: 1px solid rgba(0,0,0,0.1); background:white; font-size: 18px; font-weight: 700; text-align: center; appearance: none; color: #000; }
        select:disabled { background: #e5e5ea; color: #8e8e93; opacity: 1; }
        .buttons { display:flex; gap:10px; margin-bottom: 25px; }
        .buttons button { flex:1; height: 110px; border-radius:22px; border:none; font-weight:800; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 18px; }
        .missing-btn { background:#ff3b30 !important; color: white !important; }
        .low-btn { background:#ffcc00 !important; color: black !important; }
        .ok-btn { background:#34c759 !important; color: white !important; }
        .buttons button:disabled { cursor: default; opacity: 1; }
        
        /* מבנה הדיווחים - מותאם לסליידר */
        .card-wrapper { position: relative; margin-bottom: 12px; display: flex; align-items: center; justify-content: flex-end; background: #4a3fff; border-radius: 20px; overflow: hidden; }
        .card { background:white; position:relative; z-index:2; border-radius:20px; padding:20px; display: flex; justify-content: space-between; align-items: center; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.3s ease; box-sizing: border-box; }
        .card.missing { border-right:8px solid #ff3b30; }
        .card.low { border-right:8px solid #ffcc00; }
        
        /* כפתור מחיקה - מוסתר מתחת לכרטיס */
        .delete-action-slide { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; background: #4a3fff; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; z-index: 1; }
        
        /* כפתור מחיקה למחשב - מופיע רק כשיש מקום */
        .delete-btn-pc { display: none; background: #4a3fff; color: white; border: none; padding: 10px 14px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-left: 10px; white-space: nowrap; }
        @media (min-width: 600px) {
            .is-manager .delete-btn-pc { display: block; }
            .card-wrapper { background: transparent; overflow: visible; }
        }
    </style>
</head>
<body>
    <div class="header"><img src="https://imgur.com/F8tpXBE.png" class="logo-big"></div>
    <div class="top-bar">
        <button id="loginBtn" onclick="loginManager()">👤 איש משק</button>
        <button id="logoutBtn" onclick="logoutManager()">יציאה 👋</button>
    </div>
    <div class="container">
        <select id="kitchen" onchange="loadReports()"></select>
        <select id="product"></select>
        <div class="buttons" id="actionButtons">
            <button class="missing-btn" onclick="report('MISSING')">❌<br>חסר</button>
            <button class="low-btn" onclick="report('LOW')">⚠️<br>מעט</button>
            <button class="ok-btn" onclick="report('OK')">✅<br>יש</button>
        </div>
        <div id="reportsList"></div>
    </div>
<script>
    const SUPABASE_URL = "https://wjkqdlafwuucmpluvueu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indqa3FkbGFmd3V1Y21wbHV2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODA0MTcsImV4cCI6MjA5MTY1NjQxN30.ZjnmAtxYl94J-scm0WDiz8J4H0Plh06mn8MV2q5Bkpc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let isManager = false;

    function updateUI() {
        document.getElementById('loginBtn').style.display = isManager ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = isManager ? 'block' : 'none';
        document.body.classList.toggle('is-manager', isManager);
        document.querySelectorAll('#actionButtons button, #kitchen, #product').forEach(el => el.disabled = isManager);
    }

    async function loginManager() {
        const pass = prompt("🔐 סיסמת איש משק:");
        if (pass === "1234") {
            isManager = true; updateUI(); loadReports();
            alert("ברוך הבא, מצב עריכה פעיל ✅");
        } else if (pass !== null) { alert("❌ סיסמה שגויה! הגישה נדחתה."); }
    }

    function logoutManager() {
        isManager = false; updateUI(); loadReports();
        alert("יצאת ממצב איש משק. מצב מדווח פעיל 👋");
    }

   async function report(type) {
        if (isManager) return;
        const kId = document.getElementById('kitchen').value;
        const pId = document.getElementById('product').value;

// 1. עדכון ה-DB
    const { error } = await supabaseClient.from('reports').upsert(
    { kitchen_id: parseInt(kId), product_id: parseInt(pId), type: type },
    { onConflict: 'kitchen_id,product_id' }
);

    if (!error) {
        if (type === 'OK') confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
    
    // 2. קריאה לפונקציה עם אבטחה בסיסית
        fetch(`${SUPABASE_URL}/functions/v1/smooth-worker`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${SUPABASE_KEY}` // הוספנו את זה חזרה בצורה תקינה
        },
        body: JSON.stringify({ record: { kitchen_id: kId, product_id: pId, type: type } })
    })
    .then(res => res.json())
    .then(data => console.log("Push Success:", data))
    .catch(err => console.log("Push log (can ignore):", err));
    
    loadReports();
}
}
    
    async function deleteReport(id) {
        if (!isManager) return;
        await supabaseClient.from('reports').delete().eq('id', id);
        loadReports();
    }

    async function loadReports() {
        const { data } = await supabaseClient.from('reports').select('id, type, kitchens(name), products(name)').neq('type', 'OK').order('id', { ascending: false });
        const list = document.getElementById('reportsList');
        list.innerHTML = "";
        data?.forEach(r => {
            const wrapper = document.createElement("div");
            wrapper.className = "card-wrapper";
            
            // כפתור רקע לסליידר (נייד)
            if (isManager) {
                const slideDel = document.createElement("div");
                slideDel.className = "delete-action-slide"; slideDel.innerText = "מחיקה";
                wrapper.appendChild(slideDel);
            }

            const card = document.createElement("div");
            card.className = `card ${r.type.toLowerCase()}`;
            card.innerHTML = `<div><b>${r.kitchens?.name || ''}</b><br>${r.products?.name || ''}</div><div>${r.type === 'MISSING' ? '❌' : '⚠️'}</div>`;
            
            if (isManager) {
                // לוגיקת סליידר מתוקנת
                let startX = 0, currentX = 0;
                card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; card.style.transition = "none"; }, {passive: true});
                card.addEventListener('touchmove', e => {
                    currentX = e.touches[0].clientX - startX;
                    // החלקה שמאלה (ערך שלילי) חושפת את הצד הימני
                    if (currentX < 0 && currentX > -100) card.style.transform = `translateX(${currentX}px)`;
                }, {passive: true});
                card.addEventListener('touchend', () => {
                    card.style.transition = "transform 0.3s ease";
                    if (currentX < -70) { 
                        if (confirm("למחוק דיווח זה?")) deleteReport(r.id); 
                        else card.style.transform = 'translateX(0)'; 
                    } else card.style.transform = 'translateX(0)';
                    currentX = 0;
                });

                // כפתור למחשב
                const pcDel = document.createElement("button");
                pcDel.className = "delete-btn-pc"; pcDel.innerText = "מחיקה";
                pcDel.onclick = () => { if(confirm("למחוק?")) deleteReport(r.id); };
                wrapper.appendChild(pcDel);
            }
            
            wrapper.appendChild(card);
            list.appendChild(wrapper);
        });
    }

    async function init() {
        const { data: ks } = await supabaseClient.from('kitchens').select('*');
        const { data: ps } = await supabaseClient.from('products').select('*');
        const kSel = document.getElementById('kitchen');
        const pSel = document.getElementById('product');
        ks?.forEach(k => kSel.add(new Option(k.name, k.id)));
        ps?.forEach(p => pSel.add(new Option(p.name, p.id)));
        loadReports();
    }
    init();
    supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => loadReports()).subscribe();
</script>
</body>
</html>
