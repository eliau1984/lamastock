<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LamaStock Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { margin:0; font-family:-apple-system, system-ui, sans-serif; background:#f2f2f7; user-select: none; }
        .header { text-align: center; padding: 20px; background: linear-gradient(135deg, #6a5cff, #4a3fff); }
        .logo-big { width: 400px; max-width: 90%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .top-bar { display:flex; justify-content:space-between; padding:15px; }
        .top-bar button { background: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #logoutBtn { display: none; background: #ff3b30; color: white; }
        .container { max-width:500px; margin:auto; padding:15px; }
        
        select { 
            width:100%; padding:18px; margin-bottom:12px; border-radius:16px; 
            border: 1px solid rgba(0,0,0,0.1); background:white; font-size: 20px; 
            font-weight: 700; text-align: center; appearance: none;
        }

        .buttons { display:flex; gap:10px; margin-bottom: 25px; }
        .buttons button { 
            flex:1; height: 120px; border-radius:25px; border:none; 
            font-weight:800; color: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 10px; font-size: 18px;
        }
        .btn-icon { font-size: 32px; background: rgba(255,255,255,0.2); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        
        .missing-btn { background:#ff3b30; }
        .low-btn { background:#ffcc00; color: #000 !important; }
        .ok-btn { background:#34c759; }

        .card-wrapper { position: relative; margin-bottom: 12px; border-radius: 20px; background: #ff3b30; overflow: hidden; }
        .card { background:white; position:relative; z-index:2; border-radius:20px; padding:20px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.3s ease; }
        .card.missing { border-right:8px solid #ff3b30; }
        .card.low { border-right:8px solid #ffcc00; }
        .delete-action { position: absolute; right: 0; top: 0; bottom: 0; width: 100px; background: #ff3b30; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>
    <div class="header"><img src="https://imgur.com/F8tpXBE.png" class="logo-big"></div>
    <div class="top-bar">
        <button id="loginBtn" onclick="loginManager()">👤 איש משק</button>
        <button id="logoutBtn" onclick="logoutManager()">יציאה 👋</button>
    </div>
    <div class="container">
        <select id="kitchen" onchange="loadReports()"></select>
        <select id="product"></select>
        <div class="buttons" id="actionButtons">
            <button class="missing-btn" onclick="report('MISSING')"><div class="btn-icon">❌</div>חסר</button>
            <button class="low-btn" onclick="report('LOW')"><div class="btn-icon">⚠️</div>מעט</button>
            <button class="ok-btn" onclick="report('OK')"><div class="btn-icon">✅</div>יש</button>
        </div>
        <div id="reportsList"></div>
    </div>

<script>
    const SUPABASE_URL = "https://wjkqdlafwuucmpluvueu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indqa3FkbGFmd3V1Y21wbHV2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODA0MTcsImV4cCI6MjA5MTY1NjQxN30.ZjnmAtxYl94J-scm0WDiz8J4H0Plh06mn8MV2q5Bkpc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isManager = false;

    function updateUI() {
        document.getElementById('loginBtn').style.display = isManager ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = isManager ? 'block' : 'none';
        document.querySelectorAll('#actionButtons button, select').forEach(el => el.disabled = isManager);
    }

    async function loginManager() {
        if (prompt("סיסמה:") === "1234") { isManager = true; updateUI(); loadReports(); }
    }

    function logoutManager() { isManager = false; updateUI(); loadReports(); }

    async function report(type) {
        const kId = document.getElementById('kitchen').value;
        const pId = document.getElementById('product').value;
        const { error } = await supabaseClient.from('reports').upsert(
            { kitchen_id: parseInt(kId), product_id: parseInt(pId), type: type },
            { onConflict: 'kitchen_id,product_id' }
        );
        if (!error) {
            if (type === 'OK') confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            loadReports();
        } else alert("שגיאה: " + error.message);
    }

    async function deleteReport(id) {
        await supabaseClient.from('reports').delete().eq('id', id);
        loadReports();
    }

    async function loadReports() {
        const { data } = await supabaseClient.from('reports').select(`id, type, kitchens(name), products(name)` bits).neq('type', 'OK').order('id', { ascending: false });
        const list = document.getElementById('reportsList');
        list.innerHTML = "";
        data?.forEach(r => {
            const wrapper = document.createElement("div");
            wrapper.className = "card-wrapper";
            const del = document.createElement("div");
            del.className = "delete-action"; del.innerText = "מחיקה";
            del.onclick = () => deleteReport(r.id);
            const card = document.createElement("div");
            card.className = `card ${r.type.toLowerCase()}`;
            card.innerHTML = `<div><b>${r.kitchens.name}</b><br>${r.products.name}</div><div>${r.type === 'MISSING' ? '❌' : '⚠️'}</div>`;
            
            let startX = 0, currentX = 0;
            card.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            card.addEventListener('touchmove', e => {
                currentX = e.touches[0].clientX - startX;
                if (currentX < 0 && currentX > -100) card.style.transform = `translateX(${currentX}px)`;
            });
            card.addEventListener('touchend', () => {
                if (currentX < -70) { if (confirm("למחוק?")) deleteReport(r.id); else card.style.transform = 'translateX(0)'; }
                else card.style.transform = 'translateX(0)';
            });

            wrapper.appendChild(del); wrapper.appendChild(card); list.appendChild(wrapper);
        });
    }

    async function init() {
        const { data: ks } = await supabaseClient.from('kitchens').select('*');
        const { data: ps } = await supabaseClient.from('products').select('*');
        const kSel = document.getElementById('kitchen');
        const pSel = document.getElementById('product');
        ks?.forEach(k => kSel.add(new Option(k.name, k.id)));
        ps?.forEach(p => pSel.add(new Option(p.name, p.id)));
        loadReports();
    }
    init();
</script>
</body>
</html>
