<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LamaStock Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#6a5cff">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body { 
            margin:0; font-family:-apple-system, system-ui, sans-serif; background:#f2f2f7; 
            user-select: none; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .header { text-align: center; padding: 40px 15px 30px; background: linear-gradient(135deg, #6a5cff, #4a3fff); color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .logo-big { width: 400px; max-width: 80%; height: auto; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .top-bar { display:flex; justify-content:space-between; padding:15px; }
        .top-bar button { background: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #logoutBtn { display: none; background: #ff3b30; color: white; }
        .container { max-width:500px; margin:auto; padding:15px; }
        select { width:100%; padding:16px; margin-bottom:12px; border-radius:16px; border: 1px solid rgba(0,0,0,0.1); background:white; font-size: 16px; appearance: none; }
        
        .buttons { display:flex; gap:10px; margin-bottom: 25px; }
        .buttons button { flex:1; padding:18px 10px; border-radius:20px; border:none; font-weight:700; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: transform 0.1s; }
        .buttons button:disabled { opacity: 0.5; filter: grayscale(0.8); cursor: not-allowed; transform: none !important; }
        .buttons button:active { transform: scale(0.95); }
        .btn-icon { background: rgba(255, 255, 255, 0.3); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 20px; }
        .missing-btn { background:#ff3b30; }
        .low-btn { background:#ffcc00; color:black; }
        .ok-btn { background:#34c759; }

        .card-wrapper { position: relative; margin-bottom: 12px; border-radius: 20px; background: #ff3b30; overflow: hidden; }
        .card { 
            background:white; position:relative; z-index:2; border-radius:20px; padding:20px; 
            display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.3s ease; touch-action: pan-y; will-change: transform;
        }
        .card.missing { border-right:6px solid #ff3b30; }
        .card.low { border-right:6px solid #ffcc00; }
        .delete-action { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 100px; 
            background: #ff3b30; color: white; display: flex; align-items: center; 
            justify-content: center; font-weight: 700; font-size: 16px; z-index: 1;
        }
        .card-title { font-weight:700; font-size: 18px; }
        .card-sub { color:#8e8e93; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header"><img src="https://imgur.com/F8tpXBE.png" class="logo-big"></div>
    <div class="top-bar">
        <button id="loginBtn" onclick="loginManager()">👤 איש משק</button>
        <button id="logoutBtn" onclick="logoutManager()">יציאה 👋</button>
    </div>
    <div class="container">
        <select id="kitchen"></select>
        <select id="product"></select>
        <div class="buttons" id="actionButtons">
            <button class="missing-btn" onclick="report('MISSING')"><span class="btn-icon">❌</span><span>חסר</span></button>
            <button class="low-btn" onclick="report('LOW')"><span class="btn-icon">⚠️</span><span>מעט</span></button>
            <button class="ok-btn" onclick="report('OK')"><span class="btn-icon">✅</span><span>יש</span></button>
        </div>
        <div id="reportsList"></div>
    </div>

<script>
    const SUPABASE_URL = "https://wjkqdlafwuucmpluvueu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indqa3FkbGFmd3V1Y21wbHV2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODA0MTcsImV4cCI6MjA5MTY1NjQxN30.ZjnmAtxYl94J-scm0WDiz8J4H0Plh06mn8MV2q5Bkpc";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isManager = false;
    const PASSWORD = "1234";

    function updateUI() {
        document.getElementById('loginBtn').style.display = isManager ? 'none' : 'block';
        document.getElementById('logoutBtn').style.display = isManager ? 'block' : 'none';
        document.querySelectorAll('#actionButtons button, select').forEach(el => el.disabled = isManager);
    }

    function loginManager() {
        const pass = prompt("🔐 סיסמת איש משק:");
        if (pass === PASSWORD) { isManager = true; updateUI(); loadReports(); }
    }

    function logoutManager() { isManager = false; updateUI(); loadReports(); }

    async function report(type) {
        if (isManager) return;
        const kId = document.getElementById('kitchen').value;
        const pId = document.getElementById('product').value;
        
        const { error } = await supabaseClient.from('reports').upsert(
            { kitchen_id: parseInt(kId), product_id: parseInt(pId), type: type },
            { onConflict: 'kitchen_id,product_id' }
        );
        
        if (!error) {
            if (type === 'OK') confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            // קריאה ידנית לטעינה כדי לא להסתמך רק על Realtime
            setTimeout(loadReports, 500); 
        } else {
            alert("שגיאה בדיווח: " + error.message);
        }
    }

    async function deleteReport(id) {
        const { error } = await supabaseClient.from('reports').delete().eq('id', id);
        if (!error) loadReports();
    }

    async function loadReports() {
        console.log("טוען דיווחים...");
        const { data, error } = await supabaseClient.from('reports')
            .select(`id, type, kitchens(name), products(name)`)
            .neq('type', 'OK') 
            .order('id', { ascending: false });

        if (error) {
            console.error("שגיאה בטעינה:", error);
            return;
        }

        const list = document.getElementById('reportsList');
        list.innerHTML = "";

        data.forEach((r) => {
            const wrapper = document.createElement("div");
            wrapper.className = "card-wrapper";
            const deleteAction = document.createElement("div");
            deleteAction.className = "delete-action";
            deleteAction.innerText = "מחיקה";
            
            const card = document.createElement("div");
            card.className = `card ${r.type.toLowerCase()}`;
            card.innerHTML = `<div><div class="card-title">${r.kitchens?.name || ''}</div><div class="card-sub">${r.products?.name || ''}</div></div><div>${r.type === 'MISSING' ? '❌' : '⚠️'}</div>`;
            
            let startX = 0, currentX = 0;
            card.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; card.style.transition = "none"; }, {passive: true});
            card.addEventListener('touchmove', (e) => {
                const dx = e.touches[0].clientX - startX;
                if (dx < 0 && dx > -150) { currentX = dx; card.style.transform = `translateX(${currentX}px)`; }
            }, {passive: true});
            card.addEventListener('touchend', () => {
                card.style.transition = "transform 0.3s ease";
                if (currentX < -80) {
                    if (confirm(`למחוק?`)) { card.style.transform = "translateX(-100%)"; setTimeout(() => deleteReport(r.id), 300); }
                    else card.style.transform = "translateX(0)";
                } else card.style.transform = "translateX(0)";
                currentX = 0;
            });

            deleteAction.onclick = () => confirm(`למחוק?`) && deleteReport(r.id);
            wrapper.appendChild(deleteAction);
            wrapper.appendChild(card);
            list.appendChild(wrapper);
        });
    }

    async function loadData() {
        let { data: ks } = await supabaseClient.from('kitchens').select('*');
        let { data: ps } = await supabaseClient.from('products').select('*');
        const kSelect = document.getElementById('kitchen');
        const pSelect = document.getElementById('product');
        kSelect.innerHTML = ""; pSelect.innerHTML = "";
        ks?.forEach(k => kSelect.add(new Option(k.name, k.id)));
        ps?.forEach(p => pSelect.add(new Option(p.name, p.id)));
    }

    // מאזין לשינויים ב-Database ומרענן את הרשימה אוטומטית
    const channel = supabaseClient.channel('custom-all-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => {
        console.log("שינוי זוהה ב-DB, מרענן...");
        loadReports();
    }).subscribe();

    window.onload = async () => { 
        await loadData(); 
        await loadReports(); 
        updateUI(); 
    };
</script>
</body>
</html>
